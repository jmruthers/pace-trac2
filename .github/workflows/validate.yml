name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install and build pace-core
        env:
          PACE_CORE_REPO_TOKEN: ${{ secrets.PACE_CORE_REPO_TOKEN }}
        run: bash scripts/install-pace-core.sh
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run validate
